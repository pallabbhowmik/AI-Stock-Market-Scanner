services:
  - type: web
    name: ai-stock-market-scanner
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.api_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: USE_SQLITE
        value: "true"
      - key: CORS_ORIGINS
        value: "http://localhost:3000,https://stockprediction-pi.vercel.app"
      - key: MAX_SCAN_STOCKS
        value: "30"
      - key: FULL_SCAN_TRAIN_SAMPLE
        value: "15"
      - key: SCAN_FETCH_PERIOD
        value: "6mo"
      - key: TRAIN_FETCH_PERIOD
        value: "6mo"
      - key: DOWNLOAD_CHUNK
        value: "5"
      - key: ML_N_JOBS
        value: "1"
      - key: AUTO_START_SCHEDULER
        value: "true"
    healthCheckPath: /api/health
    autoDeploy: true
